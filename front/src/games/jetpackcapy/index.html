<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jetpack Capy</title>
    <style>
        /* Reset CSS */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            line-height: 1;
            font-family: Arial, sans-serif;
            background-color: #040218;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 600px;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="phaser.js"></script>
    <script type="importmap">
    {
        "imports": {
            "Boot": "./src/scenes/Boot.js",
            "Preloader": "./src/scenes/Preloader.js",
            "Game": "./src/scenes/Game.js",
            "GameOver": "./src/scenes/GameOver.js"
        }
    }
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
